# Optional Qdrant server for Nidus (server mode).
# Start with:  docker compose up -d
# Then set in your .env:  NIDUS_QDRANT_URL=http://localhost:6333
services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: nidus-qdrant
    ports:
      - "6333:6333"   # REST/HTTP
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

volumes:
  qdrant_storage:
